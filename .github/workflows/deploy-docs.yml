name: 最终稳定版 - 发布 Storybook

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 构建 Storybook（强制显示日志）
        run: |
          echo "开始构建..."
          npm run build-storybook
          echo "构建完成，列出目录："
          ls -la
          ls -la storybook-static || echo "未生成 storybook-static 目录"

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          cname: "" # 如果不用自定义域名，留空
