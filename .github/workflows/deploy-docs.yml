name: 自动发布文档到 GitHub Pages

on:
  push:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 👇 这里去掉 environment 配置
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm run build-storybook

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "./storybook-static"

      # 👇 这里也不要加 environment
      - id: deployment
        uses: actions/deploy-pages@v4
