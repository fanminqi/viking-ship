name: 自动发布文档到 GitHub Pages

on:
  push:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 构建 Storybook (调试信息)
        run: |
          echo "当前目录结构："
          ls -la
          echo "开始构建..."
          npm run build-storybook
        # 如果你的项目在子文件夹，取消下面注释并修改路径
        # working-directory: ./your-subdir

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
