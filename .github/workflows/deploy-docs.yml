name: 最终稳定版 - 发布 Storybook (Master)

on:
  push:
    branches: [master]
  workflow_dispatch:

# 官方 Pages 部署必须的权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 构建 Storybook
        run: npm run build-storybook

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./storybook-static"

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
